# Hermes Agent 注册片段
# 文档：https://hermes-agent.nousresearch.com/docs/user-guide/features/skills

display_name: "华智融法务"
skill_name: huazhirong-legal-affairs
slash_command: /legal-affairs

hermes_config_yaml: |
  skills:
    external_dirs:
      - ~/Projects/AI-Agent-Skills

hermes_cli: |
  hermes chat --toolsets terminal,skills -q "/legal-affairs 7-Labs 续签合同新增了 Law 173，帮我审核"

bundle_file: bundles/legal-affairs.hermes.yaml

agent_instruction: |
  加载 huazhirong-legal-affairs 后：
  1. 先读 SKILL.md「三、场景路由表」，按触发词只加载对应 module
  2. 收到合同第一步：填 contract-routing.md 确认我方角色
  3. 续签必做新旧对比；Tier 评估；结论先行
  4. 归档 output/合同/；文末免责声明
  5. 单 Agent 闭环，禁止委派

cli_template: |
  python3 {skill_dir}/evaluation/run_evals.py
  python3 {skill_dir}/scripts/validate_review_output.py --sample

install_local: |
  mkdir -p ~/.hermes/skills
  ln -sf ~/Projects/AI-Agent-Skills/huazhirong-legal-affairs \
    ~/.hermes/skills/huazhirong-legal-affairs
