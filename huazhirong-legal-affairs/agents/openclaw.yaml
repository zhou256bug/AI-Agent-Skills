# OpenClaw Agent 注册片段
# 文档：https://docs.openclaw.ai/tools/skills

display_name: "华智融法务"
skill_name: huazhirong-legal-affairs
slash_command: /legal-affairs

openclaw_json: |
  {
    "skills": {
      "load": {
        "extraDirs": ["~/Projects/AI-Agent-Skills"],
        "watch": true
      },
      "entries": {
        "huazhirong-legal-affairs": {
          "enabled": true
        }
      }
    },
    "agents": {
      "defaults": {
        "skills": ["huazhirong-legal-affairs"]
      }
    }
  }

agent_instruction: |
  加载 huazhirong-legal-affairs 后：
  1. 先读 SKILL.md「三、场景路由表」，按触发词只加载对应 module
  2. 收到合同第一步：填 contract-routing.md 确认我方角色（甲方/乙方/用人单位）
  3. 续签必做新旧对比；Tier 1/2/3 评估；结论先行输出 🔴/🟡/🟢
  4. 审核意见归档 output/合同/；文末附免责声明
  5. 单 Agent 闭环，禁止委派外部 Agent 或其他 skill

cli_template: |
  python3 {skill_dir}/evaluation/run_evals.py
  python3 {skill_dir}/scripts/validate_review_output.py --sample
