instruction: |
  使用 huazhirong-legal-affairs 处理所有华智融合同审核请求。
  先按 SKILL.md「三、场景路由表」识别模式（A/B/C/D/E/H/J），只加载对应 module。
  收到合同第一步确认我方角色（甲方/乙方/用人单位），不可混用 Playbook。
  续签必做新旧对比；Tier 评估输出 🔴/🟡/🟢；归档 output/合同/。
  单 Agent 闭环，禁止委派；文末附免责声明。
