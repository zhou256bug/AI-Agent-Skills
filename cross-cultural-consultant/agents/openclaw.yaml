# OpenClaw 注册片段
# 文档：https://docs.openclaw.ai/tools/skills-config

display_name: "Cross-Cultural Consultant"
skill_name: cross-cultural-consultant
skill_key: cross-cultural-consultant

# 复制到 ~/.openclaw/openclaw.json（JSON5，按你的路径改 extraDirs）
openclaw_json: |
  {
    skills: {
      load: {
        // AI-Agent-Skills monorepo：扫描仓库内所有 SKILL.md
        extraDirs: ["~/Projects/AI-Agent-Skills"],
        watch: true,
        watchDebounceMs: 250,
      },
      entries: {
        "cross-cultural-consultant": {
          enabled: true,
        },
      },
    },
    agents: {
      defaults: {
        // 可选：默认启用本 skill；省略则所有 skill 可见
        skills: ["cross-cultural-consultant"],
      },
    },
  }

# 安装方式（skill 在子目录时，优先 extraDirs 而非 git install 根目录）
install_notes: |
  方式 A（推荐 monorepo）：
    git clone https://github.com/zhou256bug/AI-Agent-Skills.git ~/Projects/AI-Agent-Skills
    在 openclaw.json 配置 skills.load.extraDirs 指向该目录

  方式 B（仅安装本 skill 目录）：
    openclaw skills install ./cross-cultural-consultant --as cross-cultural-consultant

# Agent 加载本 skill 后的固定行为（可写入 agent 自定义 instruction）
agent_instruction: |
  加载 cross-cultural-consultant 后：
  1. 按 SKILL.md「三、场景路由表」的触发词只加载对应 module（渐进式加载，省上下文）
  2. 任何国别分析必须读 data/hofstede-dimensions.json，并给出中国基线 Delta
  3. null 维度标 N/A，不编造；输出不含本地绝对路径
  4. 手机 PDF 走 scripts/render_mobile_pdf.py（可选依赖 weasyprint/ghostscript/PyMuPDF）

cli_template: |
  python3 {skill_dir}/scripts/validate-data.py
  python3 {skill_dir}/evaluation/run_evals.py
