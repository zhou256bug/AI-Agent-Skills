<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  @page { size: A4; margin: 2cm 2.5cm; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 11pt;
    line-height: 1.7;
    color: #1a1a1a;
  }
  h1 {
    font-size: 22pt;
    font-weight: 700;
    color: {{MAIN_COLOR}};
    border-bottom: 3px solid {{MAIN_COLOR}};
    padding-bottom: 10px;
    margin-bottom: 30px;
  }
  h2 {
    font-size: 15pt;
    font-weight: 600;
    color: {{MAIN_COLOR}};
    margin-top: 28px;
    margin-bottom: 12px;
    border-left: 4px solid {{MAIN_COLOR}};
    padding-left: 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    font-size: 10.5pt;
  }
  th {
    background: {{MAIN_COLOR}};
    color: white;
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #ddd;
  }
  tr:nth-child(even) td { background: #faf5f5; }
  .highlight-box {
    background: #fef6f0;
    border-left: 4px solid #B8860B;
    padding: 12px 16px;
    margin: 15px 0;
    border-radius: 0 4px 4px 0;
  }
  .footer {
    margin-top: 35px;
    padding-top: 15px;
    border-top: 1px solid #ccc;
    font-size: 9pt;
    color: #888;
  }
  .subtitle {
    color: #666;
    font-size: 11pt;
    margin-top: -20px;
    margin-bottom: 25px;
  }
</style>
</head>
<body>

<h1>{{TITLE}}</h1>
<p class="subtitle">{{SUBTITLE}}</p>

{{CONTENT}}

<div class="footer">
  <p>数据库来源：Hofstede Insights / The Culture Factor · 框架来源：港大 EMBA6611 跨文化管理</p>
  <p>分数反映国家层面的文化倾向，个体差异始终存在。本报告由 Hermes 跨文化管理顾问生成。</p>
</div>

</body>
</html>
