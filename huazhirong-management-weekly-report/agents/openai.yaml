interface:
  display_name: "Management Weekly Report"
  short_description: "各部门经理周报邮件 → 老板手机四段长条 PDF"
  default_prompt: "Use $huazhirong-management-weekly-report 处理管理团队周报：从配置发件人的邮件取 xlsx → 汇编为四段 Markdown(重点项目进展/海外市场要闻/业务线重点关注/需老板关注的事项) → validate → 可选渲染手机长条 PDF → 可选多通道投递。命名 W{N}-日期，期号取自邮件主题括号，禁止 ISO 周；可配置项见 scripts/weekly_report_config.py。"
